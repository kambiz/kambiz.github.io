<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peloton Workout Analysis</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    background:#fff;
    color:#000;
    padding:48px 24px;
    line-height:1.6;
}
.container { max-width:1200px; margin:0 auto; }

/* ── Header ── */
.header { border-bottom:2px solid #000; padding-bottom:28px; margin-bottom:44px; }
.header h1 { font-size:2.4em; font-weight:700; letter-spacing:-.5px; margin-bottom:6px; }
.header-meta { display:flex; justify-content:space-between; align-items:baseline; flex-wrap:wrap; gap:8px; }
.header .subtitle { font-size:.95em; color:#666; }
.last-updated { font-size:.78em; color:#999; font-style:italic; }

/* ── Stat cards ── */
.stats-grid {
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:14px;
    margin-bottom:48px;
}
.stat-card { border:2px solid #000; padding:22px 14px; text-align:center; transition:background .15s; }
.stat-card:hover { background:#f5f5f5; }
.stat-card .value { font-size:2em; font-weight:700; margin-bottom:5px; font-variant-numeric:tabular-nums; line-height:1.1; }
.stat-card .label { font-size:.75em; text-transform:uppercase; letter-spacing:1.1px; color:#666; }

/* ── Chart containers ── */
.chart-container { border:1px solid #ccc; padding:24px; margin-bottom:28px; background:#fff; }
.chart-container h2 { font-size:1.15em; font-weight:600; margin-bottom:5px; letter-spacing:-.2px; }
.chart-container .description { color:#666; font-size:.82em; margin-bottom:16px; }
.two-col { display:grid; grid-template-columns:1fr 1fr; gap:24px; }
.three-col { display:grid; grid-template-columns:1fr 1fr 1fr; gap:24px; }

canvas { max-height:400px; }

/* ── Pie grid ── */
.pie-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; align-items:start; }
.pie-item { text-align:center; }
.pie-item h3 { font-size:.95em; font-weight:600; margin-bottom:10px; color:#333; }
.pie-item canvas { max-height:180px; }

/* ── Insight box ── */
.insight-box {
    border-left:3px solid #000;
    padding:16px 20px;
    margin:0 0 40px;
    background:#f9f9f9;
    font-size:.9em;
    line-height:1.75;
}

/* ── State screens ── */
.state-screen {
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:60vh; text-align:center; gap:18px;
}
.state-screen .icon { font-size:3em; }
.state-screen h2 { font-size:1.4em; font-weight:600; }
.state-screen p { color:#666; font-size:.95em; max-width:480px; line-height:1.6; }
.state-screen code {
    background:#f3f3f3; border:1px solid #ddd;
    padding:12px 20px; font-family:monospace; font-size:.9em; color:#333;
    display:block; margin-top:4px;
}
.error-detail { color:#c0392b; font-size:.85em; font-family:monospace; }
.spinner {
    width:40px; height:40px;
    border:3px solid #eee; border-top-color:#000;
    border-radius:50%;
    animation:spin .8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }

/* ── Footer ── */
.footer { text-align:center; margin-top:48px; padding-top:24px; border-top:1px solid #ccc; color:#999; font-size:.82em; }

/* ── Tablet ── */
@media(max-width:900px){
    .stats-grid { grid-template-columns:repeat(3,1fr); }
    .pie-grid { grid-template-columns:repeat(2,1fr); gap:20px; }
    .three-col { grid-template-columns:1fr 1fr; }
}

/* ── Mobile ── */
@media(max-width:600px){
    body { padding:24px 14px; }
    .header h1 { font-size:1.6em; }
    .header-meta { flex-direction:column; gap:4px; }
    .stats-grid { grid-template-columns:repeat(2,1fr); gap:10px; margin-bottom:32px; }
    .stat-card { padding:16px 10px; }
    .stat-card .value { font-size:1.5em; }
    .stat-card .label { font-size:.68em; }
    .two-col { grid-template-columns:1fr; gap:0; }
    .two-col .chart-container { margin-bottom:28px; }
    .three-col { grid-template-columns:1fr; }
    .pie-grid { grid-template-columns:repeat(2,1fr); gap:16px; }
    .chart-container { padding:18px 14px; }
    canvas { max-height:300px; }
}
</style>
</head>
<body>
<div class="container" id="app"></div>

<script>
// ─────────────────────────────────────────────────────────────
//  CONFIG
// ─────────────────────────────────────────────────────────────
const CSV_FILENAME  = 'kambizkamrani_workouts.csv';
const CACHE_KEY     = 'peloton_cache_v6';  // v6: mobile layout, rounded stats, streak card, 3 new charts
const REQUIRED_COLS = [
    'Workout Timestamp','Fitness Discipline','Length (minutes)',
    'Calories Burned','Avg. Watts','Avg. Heartrate','Instructor Name'
];

// ─────────────────────────────────────────────────────────────
//  PALETTE
// ─────────────────────────────────────────────────────────────
const C = { black:'#000', dark:'#333', mid:'#666', light:'#999', vlight:'#ccc', red:'#c0392b' };
const grays = ['#1a1a1a','#2e2e2e','#424242','#575757','#6b6b6b','#808080','#949494','#a8a8a8','#bcbcbc'];
const vivid  = ['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#1abc9c','#e67e22','#34495e','#e91e63'];

Chart.defaults.font.family = 'inherit';
Chart.defaults.color       = C.mid;
Chart.defaults.borderColor = '#e8e8e8';

// ─────────────────────────────────────────────────────────────
//  STATE SCREENS
// ─────────────────────────────────────────────────────────────
const app = document.getElementById('app');

function showLoading() {
    app.innerHTML = `
        <div class="state-screen">
            <div class="spinner"></div>
            <h2>Loading workout data…</h2>
            <p>Fetching <code>${CSV_FILENAME}</code> from the same folder as this file.</p>
        </div>`;
}

function showError(detail) {
    app.innerHTML = `
        <div class="state-screen">
            <div class="icon">⚠️</div>
            <h2>Could not load ${CSV_FILENAME}</h2>
            <p class="error-detail">${detail}</p>
            <p>Place <code>${CSV_FILENAME}</code> in the same folder as this HTML file and reload.</p>
        </div>`;
}

function showValidationError(missing) {
    app.innerHTML = `
        <div class="state-screen">
            <div class="icon">🚫</div>
            <h2>Unexpected CSV format</h2>
            <p>This doesn't look like a Peloton workout export.<br>Missing columns:</p>
            <code>${missing.join(', ')}</code>
            <p>Please use the CSV exported directly from your Peloton profile page.</p>
        </div>`;
}

// ─────────────────────────────────────────────────────────────
//  CSV PARSER
// ─────────────────────────────────────────────────────────────
function parseCSV(text) {
    const lines = text.trim().split('\n');
    const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
    return lines.slice(1).map(line => {
        const fields = [];
        let cur = '', inQ = false;
        for (const ch of line) {
            if (ch === '"') inQ = !inQ;
            else if (ch === ',' && !inQ) { fields.push(cur); cur = ''; }
            else cur += ch;
        }
        fields.push(cur);
        const row = {};
        headers.forEach((h, i) => { row[h] = (fields[i] ?? '').trim(); });
        return row;
    });
}

// ─────────────────────────────────────────────────────────────
//  TIMESTAMP PARSER
// ─────────────────────────────────────────────────────────────
function parseTS(s) {
    if (!s) return null;
    const d = new Date(s.replace(/\s*\([^)]*\)$/, '').trim());
    return isNaN(d.getTime()) ? null : d;
}

// ─────────────────────────────────────────────────────────────
//  VALIDATE
// ─────────────────────────────────────────────────────────────
function validateColumns(rows) {
    if (!rows.length) return ['(file is empty)'];
    const cols = Object.keys(rows[0]);
    return REQUIRED_COLS.filter(c => !cols.includes(c));
}

// ─────────────────────────────────────────────────────────────
//  DATA PROCESSOR
// ─────────────────────────────────────────────────────────────
function processData(rows) {
    const valid = rows
        .map(r => ({ ...r, ts: parseTS(r['Workout Timestamp']) }))
        .filter(r => r.ts !== null);

    const num = (r, k) => { const v = parseFloat(r[k]); return isNaN(v) ? null : v; };
    const ym  = ts => `${ts.getFullYear()}-${String(ts.getMonth()+1).padStart(2,'0')}`;
    const DOW = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

    valid.forEach(r => {
        r._ym  = ym(r.ts);
        r._yr  = r.ts.getFullYear();
        r._dow = DOW[r.ts.getDay()];
    });

    function groupBy(arr, fn) {
        const m = new Map();
        arr.forEach(r => { const k=fn(r); if(!m.has(k)) m.set(k,[]); m.get(k).push(r); });
        return m;
    }
    function meanStd(arr) {
        if (!arr.length) return { mean:null, std:0 };
        const m = arr.reduce((a,b)=>a+b,0)/arr.length;
        const s = arr.length>1 ? Math.sqrt(arr.reduce((a,b)=>a+(b-m)**2,0)/(arr.length-1)) : 0;
        return { mean:+m.toFixed(1), std:+s.toFixed(1) };
    }

    // Stats
    const totalMinutes  = valid.reduce((s,r)=>s+(num(r,'Length (minutes)')||0),0);
    const dates         = valid.map(r=>r.ts.getTime());
    const firstDate     = new Date(Math.min(...dates));
    const lastDate      = new Date(Math.max(...dates));
    const fmtDate       = d => d.toLocaleDateString('en-US',{month:'short',year:'numeric'});

    const stats = {
        totalWorkouts:   valid.length,
        totalCalories:   Math.round(valid.reduce((s,r)=>s+(num(r,'Calories Burned')||0),0)),
        totalHours:      +(totalMinutes/60).toFixed(1),
        cyclingDistance: +valid
            .filter(r=>r['Fitness Discipline']==='Cycling')
            .reduce((s,r)=>s+(num(r,'Distance (mi)')||0),0).toFixed(1),
        runWalkDistance: +valid
            .filter(r=>['Running','Walking'].includes(r['Fitness Discipline']))
            .reduce((s,r)=>s+(num(r,'Distance (mi)')||0),0).toFixed(1),
        firstDate:       fmtDate(firstDate),
        lastDate:        fmtDate(lastDate)
    };

    // Disciplines
    const byDisc = groupBy(valid, r=>r['Fitness Discipline']);
    const discE  = [...byDisc.entries()]
        .map(([k,v])=>({
            label:k, count:v.length,
            calories: Math.round(v.reduce((s,r)=>s+(num(r,'Calories Burned')||0),0)),
            minutes:  Math.round(v.reduce((s,r)=>s+(num(r,'Length (minutes)')||0),0))
        }))
        .sort((a,b)=>b.minutes-a.minutes);   // sort by TIME, not raw count
    const disciplines = {
        labels:   discE.map(d=>d.label),
        counts:   discE.map(d=>d.count),
        calories: discE.map(d=>d.calories),
        minutes:  discE.map(d=>d.minutes)
    };

    // Timeline
    const tlMap = new Map();
    valid.forEach(r=>tlMap.set(r._ym,(tlMap.get(r._ym)||0)+1));
    const tlKeys = [...tlMap.keys()].sort();
    const timeline = { labels:tlKeys, counts:tlKeys.map(k=>tlMap.get(k)) };

    // Instructors top-10
    const instMap = new Map();
    valid.forEach(r=>{ const n=r['Instructor Name']; if(n&&n.trim()) instMap.set(n,(instMap.get(n)||0)+1); });
    const instTop = [...instMap.entries()].sort((a,b)=>b[1]-a[1]).slice(0,10);
    const instructors = { labels:instTop.map(d=>d[0]), counts:instTop.map(d=>d[1]) };

    // Power output — cycling only, ≥3 rides/month
    const cyc   = valid.filter(r=>r['Fitness Discipline']==='Cycling'&&num(r,'Avg. Watts')!==null);
    const pwMap  = groupBy(cyc, r=>r._ym);
    const pwKeys = [...pwMap.keys()].sort().filter(k=>pwMap.get(k).length>=3);
    const powerOutput = {
        labels: pwKeys,
        mean: pwKeys.map(k=>meanStd(pwMap.get(k).map(r=>num(r,'Avg. Watts'))).mean),
        std:  pwKeys.map(k=>meanStd(pwMap.get(k).map(r=>num(r,'Avg. Watts'))).std),
        count:pwKeys.map(k=>pwMap.get(k).length)
    };

    // Heart rate — all activities, ≥3/month
    const hrRows = valid.filter(r=>num(r,'Avg. Heartrate')!==null);
    const hrMap2 = groupBy(hrRows, r=>r._ym);
    const hrKeys = [...hrMap2.keys()].sort().filter(k=>hrMap2.get(k).length>=3);
    const heartRateCombined = {
        labels: hrKeys,
        mean: hrKeys.map(k=>meanStd(hrMap2.get(k).map(r=>num(r,'Avg. Heartrate'))).mean),
        std:  hrKeys.map(k=>meanStd(hrMap2.get(k).map(r=>num(r,'Avg. Heartrate'))).std),
        count:hrKeys.map(k=>hrMap2.get(k).length)
    };

    // Calories by discipline per month (stacked) — excludes Meditation (sparse calorie data)
    const CAL_DISCS = ['Cycling','Yoga','Walking','Stretching','Running','Rowing','Strength','Cardio'];
    const calMap = new Map();  // 'YYYY-MM' -> { discipline -> calories }
    valid.forEach(r => {
        const d = r['Fitness Discipline'];
        if (!CAL_DISCS.includes(d)) return;
        const cal = num(r, 'Calories Burned');
        if (cal === null) return;
        if (!calMap.has(r._ym)) calMap.set(r._ym, {});
        const mo = calMap.get(r._ym);
        mo[d] = (mo[d] || 0) + cal;
    });
    const calMonths = [...calMap.keys()].sort();
    const caloriesByMonth = {
        labels: calMonths,
        datasets: Object.fromEntries(
            CAL_DISCS.map(d => [d, calMonths.map(m => Math.round(calMap.get(m)?.[d] || 0))])
        )
    };

    // Time of day histogram (hour 0–23)
    const hourBins = Array(24).fill(0);
    valid.forEach(r => { const h = r.ts.getHours(); if (h >= 0 && h < 24) hourBins[h]++; });
    const timeOfDay = {
        labels: Array.from({length:24}, (_,h) => `${String(h).padStart(2,'0')}:00`),
        counts: hourBins
    };

    // Heatmap
    const hmMap = groupBy(valid, r=>`${r._yr}-${r.ts.getMonth()+1}`);
    const heatmap = [];
    for (const yr of [2023,2024,2025,2026])
        for (let m=1; m<=12; m++)
            heatmap.push({ year:yr, month:m, count:(hmMap.get(`${yr}-${m}`)||[]).length });

    // Activity by year — keyed by MINUTES (not count) so pies reflect time spent
    const activityByYear = {};
    for (const yr of [2023,2024,2025,2026]) {
        const yd = valid.filter(r=>r._yr===yr);
        if (!yd.length) continue;
        const m = {};
        yd.forEach(r=>{
            const d  = r['Fitness Discipline'];
            const mn = num(r,'Length (minutes)') || 0;
            m[d] = (m[d]||0) + mn;
        });
        const asHours = Object.fromEntries(
            Object.entries(m)
                  .sort((a,b)=>b[1]-a[1])
                  .map(([k,v])=>[k, Math.round(v)])
        );
        activityByYear[yr] = asHours;
    }

    // Longest consecutive day streak
    const uniqueDates = [...new Set(valid.map(r=>r.ts.toDateString()))].map(s=>new Date(s)).sort((a,b)=>a-b);
    let longestStreak=1, curStreak=1;
    for(let i=1;i<uniqueDates.length;i++){
        const diff=(uniqueDates[i]-uniqueDates[i-1])/(1000*60*60*24);
        if(diff===1){ curStreak++; longestStreak=Math.max(longestStreak,curStreak); } else curStreak=1;
    }

    // Cycling power zone distribution
    const PW_BINS   = [0,100,150,175,200,225,250,Infinity];
    const PW_LABELS = ['< 100W','100–150W','150–175W','175–200W','200–225W','225–250W','250W+'];
    const pwZoneCounts = Array(PW_LABELS.length).fill(0);
    valid.filter(r=>r['Fitness Discipline']==='Cycling').forEach(r=>{
        const w=num(r,'Avg. Watts'); if(w===null) return;
        for(let i=0;i<PW_BINS.length-1;i++) if(w>=PW_BINS[i]&&w<PW_BINS[i+1]){ pwZoneCounts[i]++; break; }
    });
    const powerZones = { labels:PW_LABELS, counts:pwZoneCounts };

    // HR zone distribution (by session count)
    const HR_BINS   = [0,100,120,140,160,Infinity];
    const HR_LABELS = ['< 100 bpm','100–120 bpm','120–140 bpm','140–160 bpm','160+ bpm'];
    const hrZoneCounts = Array(HR_LABELS.length).fill(0);
    valid.forEach(r=>{ const h=num(r,'Avg. Heartrate'); if(h===null) return;
        for(let i=0;i<HR_BINS.length-1;i++) if(h>=HR_BINS[i]&&h<HR_BINS[i+1]){ hrZoneCounts[i]++; break; }
    });
    const hrZones = { labels:HR_LABELS, counts:hrZoneCounts };

    // Year-over-year total hours
    const YOY_YEARS = [2022,2023,2024,2025,2026];
    const yoyHours = {
        labels: YOY_YEARS.map(String),
        hours:  YOY_YEARS.map(yr=>+( valid.filter(r=>r._yr===yr).reduce((s,r)=>s+(num(r,'Length (minutes)')||0),0)/60).toFixed(1))
    };

    // Validation totals (console only)
    console.log(`✅ Disc total:${disciplines.counts.reduce((a,b)=>a+b,0)} Timeline:${timeline.counts.reduce((a,b)=>a+b,0)} Expected:${valid.length} Streak:${longestStreak}days`);

    return { stats, longestStreak, disciplines, timeline, instructors, powerOutput, heartRateCombined, caloriesByMonth, timeOfDay, heatmap, activityByYear, powerZones, hrZones, yoyHours };
}

// ─────────────────────────────────────────────────────────────
//  RENDER
// ─────────────────────────────────────────────────────────────
function renderDashboard(data, lastModified) {
    const { stats, longestStreak, disciplines, timeline, instructors, powerOutput,
            heartRateCombined, caloriesByMonth, timeOfDay, heatmap, activityByYear,
            powerZones, hrZones, yoyHours } = data;

    const luStr = lastModified
        ? new Date(lastModified).toLocaleString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'})
        : null;

    const maxPower   = powerOutput.mean.length ? Math.max(...powerOutput.mean.filter(Boolean)) : 0;
    const topInst    = instructors.labels[0] || '—';
    const topInstCt  = instructors.counts[0] || 0;

    app.innerHTML = `
        <div class="header">
            <h1>Peloton Workout Analysis</h1>
            <div class="header-meta">
                <span class="subtitle">${stats.totalWorkouts.toLocaleString()} workouts &nbsp;|&nbsp; ${stats.firstDate} – ${stats.lastDate}</span>
                ${luStr ? `<span class="last-updated">Data last updated: ${luStr}</span>` : ''}
            </div>
        </div>

        <div class="stats-grid" id="statsGrid"></div>

        <div class="insight-box">
            ${stats.totalWorkouts.toLocaleString()} workouts totalling ${stats.totalHours.toLocaleString()} hours since ${stats.firstDate}.
            Cycling power has grown to ${maxPower}W+. ${topInst} leads all instructors with ${topInstCt.toLocaleString()} sessions.
            Activity mix has diversified steadily each year.
        </div>

        <div class="chart-container">
            <h2>Workout Distribution by Discipline</h2>
            <div class="description">Sized by hours spent — not number of sessions</div>
            <canvas id="disciplineChart"></canvas>
        </div>

        <div class="two-col">
            <div class="chart-container"><h2>Calories by Activity</h2><canvas id="caloriesChart"></canvas></div>
            <div class="chart-container"><h2>Time Investment</h2><canvas id="timeChart"></canvas></div>
        </div>

        <div class="chart-container">
            <h2>Workout Frequency Over Time</h2>
            <canvas id="timelineChart"></canvas>
        </div>

        <div class="chart-container">
            <h2>Top 10 Instructors</h2>
            <canvas id="instructorChart"></canvas>
        </div>

        <div class="chart-container">
            <h2>Power Output &amp; Heart Rate Over Time (Cycling)</h2>
            <div class="description">Left axis: avg. cycling power (W) &nbsp;|&nbsp; Right axis: avg. heart rate across all activities (bpm) &nbsp;|&nbsp; Error bars: ±1 SD</div>
            <canvas id="combinedChart"></canvas>
        </div>

        <div class="chart-container">
            <h2>Activity Mix by Year</h2>
            <div class="description">Sized by hours spent — greyscale at rest, hover to reveal colour</div>
            <div class="pie-grid" id="pieGrid"></div>
        </div>

        <div class="chart-container">
            <h2>Calorie Burn by Activity Over Time</h2>
            <div class="description">Stacked monthly calories by discipline — meditation excluded (insufficient calorie data)</div>
            <canvas id="caloriesMonthChart"></canvas>
        </div>

        <div class="two-col">
            <div class="chart-container">
                <h2>Workout Time of Day</h2>
                <div class="description">Total sessions by hour across all workouts</div>
                <canvas id="timeOfDayChart"></canvas>
            </div>
            <div class="chart-container">
                <h2>Training Volume by Year</h2>
                <div class="description">Total hours invested per calendar year</div>
                <canvas id="yoyChart"></canvas>
            </div>
        </div>

        <div class="two-col">
            <div class="chart-container">
                <h2>Cycling Power Zone Distribution</h2>
                <div class="description">How many rides fall in each average watt bucket</div>
                <canvas id="powerZoneChart"></canvas>
            </div>
            <div class="chart-container">
                <h2>Heart Rate Zone Distribution</h2>
                <div class="description">Sessions by average heart rate across all activities</div>
                <canvas id="hrZoneChart"></canvas>
            </div>
        </div>

        <div class="chart-container">
            <h2>Monthly Workout Volume (2023 – 2026)</h2>
            <canvas id="heatmapChart"></canvas>
        </div>

        <div class="footer">Chart.js &nbsp;|&nbsp; ${luStr ? 'Data last updated: ' + luStr : 'kambiz.github.io'}</div>
    `;

    // Stat cards — 6 cards, 3-col grid (wraps to 2-col on mobile)
    [
        { v: stats.totalWorkouts.toLocaleString(),                         l: 'Total Workouts'     },
        { v: Math.round(stats.totalHours).toLocaleString() + ' hrs',       l: 'Time Invested'      },
        { v: Math.round(stats.totalCalories / 1000) + 'k cal',             l: 'Calories Burned'    },
        { v: longestStreak + ' days',                                       l: 'Longest Streak'     },
        { v: Math.round(stats.cyclingDistance / 1000 * 10) / 10 + 'k mi', l: 'Miles Cycled'       },
        { v: Math.round(stats.runWalkDistance) + ' mi',                    l: 'Miles Run / Walked' }
    ].forEach(s=>{
        const d=document.createElement('div'); d.className='stat-card';
        d.innerHTML=`<div class="value">${s.v}</div><div class="label">${s.l}</div>`;
        document.getElementById('statsGrid').appendChild(d);
    });

    const SS = {
        x:{ ticks:{color:C.mid}, grid:{color:'rgba(0,0,0,0.04)'} },
        y:{ ticks:{color:C.mid}, grid:{color:'rgba(0,0,0,0.04)'} }
    };

    // 1 · Discipline doughnut — slices sized by HOURS, not count
    new Chart(document.getElementById('disciplineChart'),{
        type:'doughnut',
        data:{ labels:disciplines.labels, datasets:[{ data:disciplines.minutes, backgroundColor:grays, borderWidth:2, borderColor:'#fff' }] },
        options:{ responsive:true, plugins:{
            legend:{ position:'right', labels:{padding:14,font:{size:11},color:C.mid} },
            tooltip:{ callbacks:{ label:ctx=>{
                const tot=ctx.dataset.data.reduce((a,b)=>a+b,0);
                const hrs=(ctx.parsed/60).toFixed(1);
                return `${ctx.label}: ${hrs} hrs (${(ctx.parsed/tot*100).toFixed(1)}%)`;
            }}}
        }}
    });

    // 2 · Calories horizontal bar — sorted by calories descending
    (()=>{
        const paired = disciplines.labels
            .map((l,i) => ({ l, cal: disciplines.calories[i] }))
            .sort((a,b) => b.cal - a.cal);
        new Chart(document.getElementById('caloriesChart'),{
            type:'bar',
            data:{ labels:paired.map(p=>p.l), datasets:[{ data:paired.map(p=>p.cal), backgroundColor:grays, borderWidth:0 }] },
            options:{ indexAxis:'y', responsive:true,
                plugins:{ legend:{display:false}, tooltip:{callbacks:{label:ctx=>`${ctx.parsed.x.toLocaleString()} cal`}} },
                scales:{
                    x:{ beginAtZero:true, ticks:{color:C.mid,callback:v=>(v/1000).toFixed(0)+'k'}, grid:{color:'rgba(0,0,0,0.04)'} },
                    y:{ ticks:{color:C.mid}, grid:{display:false} }
                }
            }
        });
    })();

    // 3 · Time bar — sorted by hours descending
    (()=>{
        const paired = disciplines.labels
            .map((l,i) => ({ l, hrs: +(disciplines.minutes[i]/60).toFixed(1) }))
            .sort((a,b) => b.hrs - a.hrs);
        new Chart(document.getElementById('timeChart'),{
            type:'bar',
            data:{ labels:paired.map(p=>p.l), datasets:[{ data:paired.map(p=>p.hrs), backgroundColor:grays, borderWidth:0 }] },
            options:{ responsive:true,
                plugins:{ legend:{display:false}, tooltip:{callbacks:{label:ctx=>`${ctx.parsed.y} hrs`}} },
                scales:{
                    y:{ beginAtZero:true, ticks:{color:C.mid,callback:v=>v+' hrs'}, grid:{color:'rgba(0,0,0,0.04)'} },
                    x:{ ticks:{color:C.mid}, grid:{display:false} }
                }
            }
        });
    })();

    // 4 · Timeline line
    new Chart(document.getElementById('timelineChart'),{
        type:'line',
        data:{ labels:timeline.labels, datasets:[{
            label:'Workouts / month', data:timeline.counts,
            borderColor:C.black, backgroundColor:'rgba(0,0,0,0.05)',
            fill:true, tension:0.4, borderWidth:2,
            pointRadius:3, pointBackgroundColor:C.black, pointBorderColor:'#fff', pointBorderWidth:1
        }]},
        options:{ responsive:true, plugins:{legend:{display:false}}, scales:SS }
    });

    // 5 · Instructors horizontal bar
    new Chart(document.getElementById('instructorChart'),{
        type:'bar',
        data:{ labels:instructors.labels, datasets:[{ data:instructors.counts, backgroundColor:grays, borderWidth:0 }] },
        options:{ indexAxis:'y', responsive:true,
            plugins:{legend:{display:false}},
            scales:{
                x:{ beginAtZero:true, ticks:{color:C.mid}, grid:{color:'rgba(0,0,0,0.04)'} },
                y:{ ticks:{color:C.mid,font:{size:10}}, grid:{display:false} }
            }
        }
    });

    // 6 · Combined power + HR (dual-axis + error bars)
    (()=>{
        const hrIdx={};
        heartRateCombined.labels.forEach((l,i)=>hrIdx[l]=i);
        const hrMean = powerOutput.labels.map(l=>hrIdx[l]!==undefined?heartRateCombined.mean[hrIdx[l]]:null);
        const hrStd  = powerOutput.labels.map(l=>hrIdx[l]!==undefined?heartRateCombined.std[hrIdx[l]]:0);

        new Chart(document.getElementById('combinedChart'),{
            type:'line',
            data:{ labels:powerOutput.labels, datasets:[
                {
                    label:'Power Output (W)', data:powerOutput.mean, yAxisID:'y',
                    borderColor:C.black, backgroundColor:'rgba(0,0,0,0.05)',
                    fill:true, tension:0.4, borderWidth:2,
                    pointRadius:4, pointBackgroundColor:C.black, pointBorderColor:'#fff', pointBorderWidth:2
                },
                {
                    label:'Heart Rate (bpm)', data:hrMean, yAxisID:'y1',
                    borderColor:C.red, backgroundColor:'rgba(192,57,43,0.05)',
                    fill:false, tension:0.4, borderWidth:2,
                    pointRadius:4, pointBackgroundColor:C.red, pointBorderColor:'#fff', pointBorderWidth:2
                }
            ]},
            options:{
                responsive:true, interaction:{mode:'index',intersect:false},
                plugins:{
                    legend:{ display:true, position:'top', labels:{color:C.mid,font:{size:11}} },
                    tooltip:{ callbacks:{ label:ctx=>{
                        const i=ctx.dataIndex, v=ctx.parsed.y;
                        if(v===null) return null;
                        return ctx.datasetIndex===0
                            ? `Power: ${v.toFixed(1)} W ±${powerOutput.std[i].toFixed(1)} W`
                            : `Heart Rate: ${v.toFixed(1)} bpm ±${hrStd[i].toFixed(1)} bpm`;
                    }}}
                },
                scales:{
                    x:{ ticks:{color:C.mid,maxRotation:45,minRotation:45}, grid:{display:false} },
                    y:{
                        type:'linear', position:'left', beginAtZero:true,
                        title:{display:true,text:'Power (W)',color:C.black},
                        ticks:{color:C.mid,callback:v=>v+'W'}, grid:{color:'rgba(0,0,0,0.04)'}
                    },
                    y1:{
                        type:'linear', position:'right', min:60, max:180,
                        title:{display:true,text:'Heart Rate (bpm)',color:C.red},
                        ticks:{color:C.red,callback:v=>v+' bpm'}, grid:{drawOnChartArea:false}
                    }
                }
            },
            plugins:[{ afterDatasetsDraw(chart){
                const ctx=chart.ctx;
                const bars=(mi,means,stds,scaleId,color)=>{
                    const meta=chart.getDatasetMeta(mi), ys=chart.scales[scaleId];
                    meta.data.forEach((pt,i)=>{
                        if(means[i]===null) return;
                        const x=pt.x, yT=ys.getPixelForValue(means[i]+stds[i]), yB=ys.getPixelForValue(means[i]-stds[i]);
                        ctx.save(); ctx.strokeStyle=color; ctx.lineWidth=1.2;
                        [[x,yT,x,yB],[x-3,yT,x+3,yT],[x-3,yB,x+3,yB]].forEach(([x1,y1,x2,y2])=>{
                            ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
                        });
                        ctx.restore();
                    });
                };
                bars(0,powerOutput.mean,powerOutput.std,'y','rgba(0,0,0,0.25)');
                bars(1,hrMean,hrStd,'y1','rgba(192,57,43,0.3)');
            }}]
        });
    })();

    // 7 · Activity-mix pies (greyscale → colour on hover)
    const pieGrid=document.getElementById('pieGrid');
    [2023,2024,2025,2026].forEach(yr=>{
        const yd=activityByYear[yr]; if(!yd) return;
        const div=document.createElement('div'); div.className='pie-item';
        div.innerHTML=`<h3>${yr}</h3><canvas id="pie${yr}"></canvas>`;
        pieGrid.appendChild(div);
        const labels=Object.keys(yd), values=Object.values(yd), n=labels.length;
        new Chart(document.getElementById('pie'+yr),{
            type:'pie',
            data:{ labels, datasets:[{
                data:values,
                backgroundColor:grays.slice(0,n),
                hoverBackgroundColor:vivid.slice(0,n),
                borderWidth:2, borderColor:'#fff', hoverBorderColor:'#fff'
            }]},
            options:{ responsive:true, plugins:{
                legend:{display:false},
                tooltip:{ callbacks:{ label:ctx=>{
                    const tot=ctx.dataset.data.reduce((a,b)=>a+b,0);
                    const hrs=(ctx.parsed/60).toFixed(1);
                    return `${ctx.label}: ${hrs} hrs (${(ctx.parsed/tot*100).toFixed(1)}%)`;
                }}}
            }}
        });
    });

    // 8 · Stacked calories by discipline per month
    (()=>{
        const CAL_DISCS = ['Cycling','Yoga','Walking','Stretching','Running','Rowing','Strength','Cardio'];
        // Grayscale shades mapped to each discipline (darkest = cycling = most calories)
        const discGrays = ['#1a1a1a','#383838','#555555','#717171','#8d8d8d','#a8a8a8','#c4c4c4','#dedede'];
        const datasets = CAL_DISCS
            .map((d,i) => ({
                label: d,
                data:  caloriesByMonth.datasets[d] || caloriesByMonth.labels.map(()=>0),
                backgroundColor: discGrays[i],
                borderWidth: 0,
                stack: 'cal'
            }))
            .filter(ds => ds.data.some(v=>v>0));  // drop disciplines with no data

        new Chart(document.getElementById('caloriesMonthChart'),{
            type:'bar',
            data:{ labels:caloriesByMonth.labels, datasets },
            options:{
                responsive:true,
                plugins:{
                    legend:{ position:'top', labels:{color:C.mid,font:{size:10},padding:12} },
                    tooltip:{
                        mode:'index',
                        callbacks:{
                            label: ctx => {
                                if (!ctx.parsed.y) return null;
                                return `${ctx.dataset.label}: ${ctx.parsed.y.toLocaleString()} cal`;
                            },
                            footer: items => {
                                const tot = items.reduce((s,i)=>s+i.parsed.y,0);
                                return `Total: ${tot.toLocaleString()} cal`;
                            }
                        }
                    }
                },
                scales:{
                    x:{ ticks:{color:C.mid,maxRotation:45,minRotation:45}, grid:{display:false} },
                    y:{ stacked:true, beginAtZero:true,
                        ticks:{color:C.mid, callback:v=>v>=1000?(v/1000).toFixed(0)+'k':v},
                        grid:{color:'rgba(0,0,0,0.04)'}
                    }
                }
            }
        });
    })();

    // 9 · Time of day histogram
    (()=>{
        // Shade bars by period: night=lightest, midday peak=darkest
        const barColors = timeOfDay.counts.map((_,h) => {
            if (h >= 5  && h <= 11) return '#2e2e2e';   // morning — dark
            if (h >= 12 && h <= 17) return '#575757';   // afternoon — mid
            if (h >= 18 && h <= 22) return '#8c8c8c';   // evening — lighter
            return '#c4c4c4';                            // night/early — lightest
        });
        new Chart(document.getElementById('timeOfDayChart'),{
            type:'bar',
            data:{ labels:timeOfDay.labels, datasets:[{
                label:'Sessions',
                data:timeOfDay.counts,
                backgroundColor:barColors,
                borderWidth:0
            }]},
            options:{
                responsive:true,
                plugins:{
                    legend:{display:false},
                    tooltip:{ callbacks:{ label:ctx=>`${ctx.parsed.y} sessions` }}
                },
                scales:{
                    x:{ ticks:{color:C.mid,maxRotation:45,minRotation:45}, grid:{display:false} },
                    y:{ beginAtZero:true, ticks:{color:C.mid}, grid:{color:'rgba(0,0,0,0.04)'} }
                }
            }
        });
    })();

    // 10 · Year-over-year total hours
    new Chart(document.getElementById('yoyChart'),{
        type:'bar',
        data:{ labels:yoyHours.labels, datasets:[{
            data:yoyHours.hours,
            backgroundColor: yoyHours.labels.map((_,i)=>grays[Math.min(i,grays.length-1)]),
            borderWidth:0
        }]},
        options:{ responsive:true,
            plugins:{ legend:{display:false},
                tooltip:{ callbacks:{ label:ctx=>`${ctx.parsed.y} hrs` }}
            },
            scales:{
                y:{ beginAtZero:true, ticks:{color:C.mid, callback:v=>v+' hrs'}, grid:{color:'rgba(0,0,0,0.04)'} },
                x:{ ticks:{color:C.mid}, grid:{display:false} }
            }
        }
    });

    // 11 · Cycling power zone distribution
    new Chart(document.getElementById('powerZoneChart'),{
        type:'bar',
        data:{ labels:powerZones.labels, datasets:[{
            data:powerZones.counts,
            backgroundColor:grays.slice(0,powerZones.labels.length),
            borderWidth:0
        }]},
        options:{ responsive:true,
            plugins:{ legend:{display:false},
                tooltip:{ callbacks:{ label:ctx=>`${ctx.parsed.y} rides` }}
            },
            scales:{
                y:{ beginAtZero:true, ticks:{color:C.mid}, grid:{color:'rgba(0,0,0,0.04)'} },
                x:{ ticks:{color:C.mid,maxRotation:30,minRotation:30}, grid:{display:false} }
            }
        }
    });

    // 12 · Heart rate zone distribution
    new Chart(document.getElementById('hrZoneChart'),{
        type:'bar',
        data:{ labels:hrZones.labels, datasets:[{
            data:hrZones.counts,
            backgroundColor:grays.slice(0,hrZones.labels.length),
            borderWidth:0
        }]},
        options:{ responsive:true,
            plugins:{ legend:{display:false},
                tooltip:{ callbacks:{ label:ctx=>`${ctx.parsed.y} sessions` }}
            },
            scales:{
                y:{ beginAtZero:true, ticks:{color:C.mid}, grid:{color:'rgba(0,0,0,0.04)'} },
                x:{ ticks:{color:C.mid,maxRotation:30,minRotation:30}, grid:{display:false} }
            }
        }
    });

    // 13 · Monthly heatmap
    const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const byYr={2023:Array(12).fill(0),2024:Array(12).fill(0),2025:Array(12).fill(0),2026:Array(12).fill(0)};
    heatmap.forEach(r=>{ if(byYr[r.year]) byYr[r.year][r.month-1]=r.count; });
    new Chart(document.getElementById('heatmapChart'),{
        type:'bar',
        data:{ labels:months, datasets:[
            { label:'2023', data:byYr[2023], backgroundColor:'#1a1a1a', borderWidth:0 },
            { label:'2024', data:byYr[2024], backgroundColor:'#575757', borderWidth:0 },
            { label:'2025', data:byYr[2025], backgroundColor:'#8c8c8c', borderWidth:0 },
            { label:'2026', data:byYr[2026], backgroundColor:'#bdbdbd', borderWidth:0 }
        ]},
        options:{ responsive:true,
            plugins:{ legend:{ position:'top', labels:{color:C.mid,font:{size:11},padding:14} } },
            scales:{
                x:{ ticks:{color:C.mid}, grid:{display:false} },
                y:{ beginAtZero:true, ticks:{color:C.mid}, grid:{color:'rgba(0,0,0,0.04)'} }
            }
        }
    });
}

// ─────────────────────────────────────────────────────────────
//  BOOT
// ─────────────────────────────────────────────────────────────
async function boot() {
    showLoading();

    // ── Try to fetch the CSV ───────────────────────────────
    let csvText = null, lastModified = null;
    try {
        const res = await fetch(CSV_FILENAME, { cache:'no-store' });
        if (!res.ok) throw new Error(`HTTP ${res.status} – ${res.statusText}`);
        lastModified = res.headers.get('Last-Modified') || new Date().toISOString();
        csvText = await res.text();
    } catch (fetchErr) {
        // Fall back to localStorage cache if available
        try {
            const cached = JSON.parse(localStorage.getItem(CACHE_KEY) || 'null');
            if (cached?.data) {
                console.warn('CSV fetch failed; using cache:', fetchErr.message);
                renderDashboard(cached.data, cached.lastModified);
                return;
            }
        } catch (_) {}
        showError(fetchErr.message);
        return;
    }

    // ── Validate columns ───────────────────────────────────
    const rows   = parseCSV(csvText);
    const missing = validateColumns(rows);
    if (missing.length) { showValidationError(missing); return; }

    // ── Skip re-processing if nothing changed ──────────────
    try {
        const cached = JSON.parse(localStorage.getItem(CACHE_KEY) || 'null');
        if (cached?.lastModified === lastModified && cached?.rowCount === rows.length) {
            console.log('Cache hit — skipping re-processing.');
            renderDashboard(cached.data, cached.lastModified);
            return;
        }
    } catch (_) {}

    // ── Process & cache ────────────────────────────────────
    const processed = processData(rows);
    try {
        localStorage.setItem(CACHE_KEY, JSON.stringify({
            data: processed,
            lastModified,
            rowCount: rows.length,
            cachedAt: new Date().toISOString()
        }));
    } catch (e) {
        console.warn('localStorage write failed:', e.message);
    }

    renderDashboard(processed, lastModified);
}

boot();
</script>
